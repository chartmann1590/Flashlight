name: Android Signed Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > release-key.jks

      - name: Build signed APK and AAB
        env:
          # Gradle reads these for monotonic versionCode / versionName (incl. workflow re-runs).
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          set -e
          for attempt in 1 2 3 4 5; do
            if ./gradlew --no-daemon assembleRelease bundleRelease; then
              exit 0
            fi
            echo "Gradle attempt ${attempt} failed (often transient Maven Central 403). Retrying in 25s..."
            sleep 25
          done
          echo "Gradle failed after 5 attempts."
          exit 1

      - name: Verify release ads are enabled
        run: |
          bc="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          if [ ! -f "$bc" ]; then
            echo "Missing $bc"
            exit 1
          fi
          if ! grep -q 'ADS_ENABLED = true' "$bc"; then
            echo "Release BuildConfig does not have ADS_ENABLED=true. Failing build."
            exit 1
          fi

      - name: Assert Play Store versionCode bumped on CI
        run: |
          bc="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          vc="$(sed -n 's/.*VERSION_CODE = \([0-9]*\);.*/\1/p' "$bc")"
          vn="$(sed -n 's/.*VERSION_NAME = "\([^"]*\)";.*/\1/p' "$bc")"
          echo "Built versionCode=${vc} versionName=${vn}"
          if [ -z "$vc" ] || [ "$vc" -lt 2000000 ]; then
            echo "On CI, versionCode must be >= 2000000 (2_000_000 + GITHUB_RUN_NUMBER*1000 + GITHUB_RUN_ATTEMPT). Got: ${vc:-empty}"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-signed-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      # Real GitHub Release with downloadable assets (APK + AAB). Uses --target so the tag is created on GitHub with binaries attached.
      - name: Publish GitHub Release (signed APK + AAB)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release delete ci-signed-latest --yes --cleanup-tag 2>/dev/null || true
          BC="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          VC="$(sed -n 's/.*VERSION_CODE = \([0-9]*\);.*/\1/p' "$BC")"
          VN="$(sed -n 's/.*VERSION_NAME = "\([^"]*\)";.*/\1/p' "$BC")"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"
          for f in "$APK_SRC" "$AAB_SRC"; do
            test -f "$f" || { echo "Missing artifact: $f"; exit 1; }
            ls -la "$f"
          done
          REL_APK="Flashlight-${VN}-signed.apk"
          REL_AAB="Flashlight-${VN}-PlayStore-signed.aab"
          cp "$APK_SRC" "$REL_APK"
          cp "$AAB_SRC" "$REL_AAB"
          # Unique per workflow run (re-runs keep same run_id; delete+recreate is OK)
          TAG="v${VN}-ci${GITHUB_RUN_ID}"
          NOTES_FILE="$(mktemp)"
          {
            echo "Signed **release APK** and **Android App Bundle (AAB)** for Play Console."
            echo
            echo "- **versionCode:** \`${VC}\`"
            echo "- **versionName:** \`${VN}\`"
            echo "- Commit: [\`${GITHUB_SHA:0:7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- [Workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo
            echo "Download **${REL_APK}** to sideload, or **${REL_AAB}** for Play Store upload."
          } > "$NOTES_FILE"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --target "${GITHUB_SHA}" \
            --title "Flashlight ${VN} (versionCode ${VC})" \
            --notes-file "$NOTES_FILE" \
            --latest \
            "$REL_APK" \
            "$REL_AAB"
          rm -f "$NOTES_FILE" "$REL_APK" "$REL_AAB"
          echo "Published release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          gh release view "$TAG" --json assets --jq '.assets[].name'

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
