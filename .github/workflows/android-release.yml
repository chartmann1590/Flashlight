name: Android Signed Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > release-key.jks

      - name: Build signed artifacts
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-signed-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
name: Android Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          echo "$RELEASE_KEYSTORE_B64" | base64 --decode > release-key.jks

      - name: Build signed APK and AAB
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Rename artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/flashlight-release.apk
          cp app/build/outputs/bundle/release/app-release.aab app/build/outputs/bundle/release/flashlight-release.aab

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-release-builds
          path: |
            app/build/outputs/apk/release/flashlight-release.apk
            app/build/outputs/bundle/release/flashlight-release.aab

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/flashlight-release.apk
            app/build/outputs/bundle/release/flashlight-release.aab
