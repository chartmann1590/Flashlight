name: Android Signed Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > release-key.jks

      - name: Build signed APK and AAB
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          set -e
          for attempt in 1 2 3 4 5; do
            if ./gradlew --no-daemon assembleRelease bundleRelease; then
              exit 0
            fi
            echo "Gradle attempt ${attempt} failed (often transient Maven Central 403). Retrying in 25s..."
            sleep 25
          done
          echo "Gradle failed after 5 attempts."
          exit 1

      - name: Verify release ads are enabled
        run: |
          bc="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          if [ ! -f "$bc" ]; then
            echo "Missing $bc"
            exit 1
          fi
          if ! grep -q 'ADS_ENABLED = true' "$bc"; then
            echo "Release BuildConfig does not have ADS_ENABLED=true. Failing build."
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-signed-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
