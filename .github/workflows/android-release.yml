name: Android Signed Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 --decode > release-key.jks

      - name: Build signed APK and AAB
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          set -e
          for attempt in 1 2 3 4 5; do
            if ./gradlew --no-daemon assembleRelease bundleRelease; then
              exit 0
            fi
            echo "Gradle attempt ${attempt} failed (often transient Maven Central 403). Retrying in 25s..."
            sleep 25
          done
          echo "Gradle failed after 5 attempts."
          exit 1

      - name: Verify release ads are enabled
        run: |
          bc="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          if [ ! -f "$bc" ]; then
            echo "Missing $bc"
            exit 1
          fi
          if ! grep -q 'ADS_ENABLED = true' "$bc"; then
            echo "Release BuildConfig does not have ADS_ENABLED=true. Failing build."
            exit 1
          fi

      - name: Assert Play Store versionCode bumped on CI
        run: |
          bc="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          vc="$(sed -n 's/.*VERSION_CODE = \([0-9]*\);.*/\1/p' "$bc")"
          vn="$(sed -n 's/.*VERSION_NAME = "\([^"]*\)";.*/\1/p' "$bc")"
          echo "Built versionCode=${vc} versionName=${vn}"
          if [ -z "$vc" ] || [ "$vc" -lt 2000000 ]; then
            echo "On CI, versionCode must be >= 2000000 (2_000_000 + GITHUB_RUN_NUMBER). Got: ${vc:-empty}"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashlight-signed-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      # On push / manual run: publish APK + AAB to the Releases tab (not only Actions artifacts).
      - name: Publish rolling signed release (APK + AAB)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="ci-signed-latest"
          BC="app/build/generated/source/buildConfig/release/com/charles/flashlight/BuildConfig.java"
          VC="$(sed -n 's/.*VERSION_CODE = \([0-9]*\);.*/\1/p' "$BC")"
          VN="$(sed -n 's/.*VERSION_NAME = "\([^"]*\)";.*/\1/p' "$BC")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          git tag -f "$TAG" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}" --force
          NOTES_FILE="$(mktemp)"
          {
            echo "Signed **release** APK and Play Store **AAB** from the latest successful workflow on \`main\`."
            echo
            echo "- **versionCode:** \`${VC}\` (Play Store must increase each upload; CI bumps every run)"
            echo "- **versionName:** \`${VN}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- [View workflow run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo
            echo "Install the \`.apk\` for sideloading; upload the \`.aab\` to Play Console."
          } > "$NOTES_FILE"
          gh release create "$TAG" \
            --title "Signed CI build (latest main)" \
            --notes-file "$NOTES_FILE" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab \
            --prerelease
          rm -f "$NOTES_FILE"

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
