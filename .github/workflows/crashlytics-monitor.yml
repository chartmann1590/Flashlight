name: Crashlytics Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

env:
  FIREBASE_PROJECT_NUMBER: '172525138456'
  FIREBASE_APP_ID: '1:172525138456:android:155c10ddbb9f76d287c96d'
  FIREBASE_PROJECT_ID: 'flashlight-app-af20b'
  FIREBASE_ANDROID_PACKAGE: 'com.charles.flashlight'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange Firebase refresh token for access token
        id: auth
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_OAUTH_CLIENT_ID: ${{ secrets.FIREBASE_OAUTH_CLIENT_ID }}
          FIREBASE_OAUTH_CLIENT_SECRET: ${{ secrets.FIREBASE_OAUTH_CLIENT_SECRET }}
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "FIREBASE_TOKEN secret is not set"; exit 1
          fi
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            --data-urlencode "client_id=${FIREBASE_OAUTH_CLIENT_ID}" \
            --data-urlencode "client_secret=${FIREBASE_OAUTH_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${FIREBASE_TOKEN}" \
            --data-urlencode "grant_type=refresh_token")
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to obtain access token"; echo "$RESPONSE" | jq .; exit 1
          fi
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch Crashlytics top issues
        id: fetch
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          curl -s \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://firebasecrashlytics.googleapis.com/v1alpha/projects/${FIREBASE_PROJECT_NUMBER}/apps/${FIREBASE_APP_ID}/reports/topIssues?pageSize=25" \
            > crashlytics_issues.json
          cat crashlytics_issues.json | jq .
          if cat crashlytics_issues.json | jq -e '.error' > /dev/null 2>&1; then
            echo "Crashlytics API returned an error (see above)"; exit 1
          fi

      - name: Sync to GitHub Issues
        uses: actions/github-script@v8
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ env.FIREBASE_APP_ID }}
          FIREBASE_ANDROID_PACKAGE: ${{ env.FIREBASE_ANDROID_PACKAGE }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('crashlytics_issues.json', 'utf8'));
            const { owner, repo } = context.repo;
            const projectId = process.env.FIREBASE_PROJECT_ID;
            const androidPackage = process.env.FIREBASE_ANDROID_PACKAGE;
            const rawGroups = data.groups || data.issues || [];
            const errorIcon = { FATAL: '[FATAL]', ANR: '[ANR]', NON_FATAL: '[NON_FATAL]' };
            const signalEmoji = {
              SIGNAL_REGRESSED: 'Regressed',
              SIGNAL_FRESH: 'New',
              SIGNAL_EARLY: 'Early-session',
              SIGNAL_REPETITIVE: 'Repetitive',
            };

            const crashlyticsIssues = rawGroups.map(entry => {
              const inner = entry.issue || entry;
              const m = entry.metrics?.[0] || {};
              return {
                id: inner.id || inner.issueId,
                title: inner.title || 'Unknown crash',
                subtitle: inner.subtitle || '',
                state: (inner.state || 'OPEN').toUpperCase(),
                errorType: inner.errorType || 'FATAL',
                firstSeenVersion: inner.firstSeenVersion || '',
                lastSeenVersion: inner.lastSeenVersion || '',
                signals: inner.signals || [],
                consoleUri: inner.uri || '',
                eventCount: parseInt(String(m.eventsCount || inner.eventCount || '0'), 10),
                impactedUsers: parseInt(String(m.impactedUsersCount || '0'), 10),
                sessionsCount: parseInt(String(m.sessionsCount || '0'), 10),
                metricsStart: m.startTime || '',
                metricsEnd: m.endTime || '',
              };
            }).filter(i => i.id);

            console.log(`Crashlytics returned ${crashlyticsIssues.length} issues`);

            function crashlyticsLabel(id) {
              return `crashlytics:${id}`.substring(0, 50);
            }

            function buildIssueBody(ci) {
              const icon = errorIcon[ci.errorType] || '[CRASH]';
              const typeLabel = ci.errorType === 'ANR' ? 'ANR (App Not Responding)' : ci.errorType === 'NON_FATAL' ? 'Non-Fatal Exception' : 'Fatal Crash';
              const range = ci.metricsStart ? `${ci.metricsStart.slice(0, 10)} to ${ci.metricsEnd.slice(0, 10)}` : 'Last 7 days';
              const signalLines = ci.signals.map(s => `- ${signalEmoji[s.signal] || s.signal}: ${s.description}`).join('\n');
              const url = ci.consoleUri || `https://console.firebase.google.com/project/${projectId}/crashlytics/app/android:${androidPackage}/issues/${ci.id}`;
              return [
                `## ${icon} ${typeLabel}`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Crashlytics ID** | \`${ci.id}\` |`,
                `| **Exception** | ${ci.subtitle || ''} |`,
                `| **Blame frame** | \`${ci.title}\` |`,
                `| **Error type** | ${typeLabel} |`,
                `| **First seen** | ${ci.firstSeenVersion} |`,
                `| **Last seen** | ${ci.lastSeenVersion} |`,
                `| **Events (${range})** | ${ci.eventCount.toLocaleString()} |`,
                `| **Impacted users** | ${ci.impactedUsers.toLocaleString()} |`,
                `| **Sessions affected** | ${ci.sessionsCount.toLocaleString()} |`,
                ``,
                signalLines ? `### Signals\n${signalLines}\n` : '',
                `[View in Firebase Console](${url})`,
                ``,
                `<!-- crashlytics-id:${ci.id} -->`,
                `<!-- crashlytics-events:${ci.eventCount} -->`,
              ].filter(l => l !== '').join('\n');
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              }
            }

            await ensureLabel('crashlytics', 'ee0701', 'Firebase Crashlytics crash report');

            const openGHIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: 'crashlytics',
              state: 'open',
              per_page: 100,
            });

            const ghMap = {};
            for (const gh of openGHIssues) {
              const bodyId = (gh.body || '').match(/<!-- crashlytics-id:([^\s]+) -->/)?.[1];
              if (bodyId) ghMap[bodyId] = gh;
              for (const lbl of gh.labels) {
                if (lbl.name?.startsWith('crashlytics:')) {
                  ghMap[lbl.name.slice('crashlytics:'.length)] ??= gh;
                }
              }
            }

            const openIds = new Set();
            for (const ci of crashlyticsIssues) {
              if (ci.state !== 'OPEN') continue;
              openIds.add(ci.id);
              const labelName = crashlyticsLabel(ci.id);
              await ensureLabel(labelName, 'b60205', `Crashlytics issue ${ci.id}`.substring(0, 100));
              const existing = ghMap[ci.id];

              if (!existing) {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: `[Crashlytics] ${ci.subtitle || ci.title}`,
                  body: buildIssueBody(ci),
                  labels: ['crashlytics', labelName],
                });
                console.log(`Created GitHub issue #${created.data.number} for Crashlytics ${ci.id}`);
              } else {
                const prevMatch = (existing.body || '').match(/<!-- crashlytics-events:(\d+) -->/);
                const prev = prevMatch ? parseInt(prevMatch[1], 10) : 0;
                if (ci.eventCount > prev) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: existing.number,
                    body: [
                      `**Event count updated:** ${prev.toLocaleString()} to ${ci.eventCount.toLocaleString()} (+${(ci.eventCount - prev).toLocaleString()})`,
                      `- **Impacted users:** ${ci.impactedUsers.toLocaleString()}`,
                      `- **Sessions affected:** ${ci.sessionsCount.toLocaleString()}`,
                      `- **Last seen:** ${ci.lastSeenVersion}`,
                      ``,
                      `*Checked: ${new Date().toISOString()}*`,
                    ].join('\n'),
                  });
                  await github.rest.issues.update({
                    owner,
                    repo,
                    issue_number: existing.number,
                    body: (existing.body || buildIssueBody(ci)).match(/<!-- crashlytics-events:\d+ -->/)
                      ? (existing.body || buildIssueBody(ci)).replace(/<!-- crashlytics-events:\d+ -->/, `<!-- crashlytics-events:${ci.eventCount} -->`)
                      : `${existing.body || buildIssueBody(ci)}\n<!-- crashlytics-events:${ci.eventCount} -->`,
                  });
                  console.log(`Updated #${existing.number}: ${prev} to ${ci.eventCount} events`);
                } else {
                  console.log(`Issue #${existing.number} unchanged at ${ci.eventCount} events`);
                }
              }
            }

            for (const [cid, gh] of Object.entries(ghMap)) {
              if (!openIds.has(cid)) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: gh.number,
                  body: [
                    `Crashlytics issue \`${cid}\` is no longer in the open list; auto-closing.`,
                    ``,
                    `*Checked: ${new Date().toISOString()}*`,
                  ].join('\n'),
                });
                await github.rest.issues.update({ owner, repo, issue_number: gh.number, state: 'closed' });
                console.log(`Auto-closed #${gh.number}`);
              }
            }
